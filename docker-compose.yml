version: '3.8'

services:
  db:
    image: pgvector/pgvector:16-pgdg
    container_name: voicemind_prod_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: ${POSTGRES_DB:-voicemind}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Performance tuning parameters optimized for a 2GB RAM / 2 vCPU VPS Droplet
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c work_mem=32MB
      -c maintenance_work_mem=128MB
      -c max_connections=100
      -c min_wal_size=80MB
      -c max_wal_size=1GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d voicemind"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - voicemind_net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voicemind_prod_api
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgrespassword}@db:5432/${POSTGRES_DB:-voicemind}
      - SECRET_KEY=${SECRET_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-voicemind-audio}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@voicemind.ai}
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    networks:
      - voicemind_net

  nginx:
    image: nginx:alpine
    container_name: voicemind_prod_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - letsencrypt:/etc/letsencrypt
    depends_on:
      - api
    networks:
      - voicemind_net

volumes:
  postgres_data:
  letsencrypt:

networks:
  voicemind_net:
    driver: bridge
